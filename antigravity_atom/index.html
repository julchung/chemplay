<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原子混成軌域互動式展示 (Atomic Orbital Hybridization)</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div id="app-container">
        <!-- 3D Canvas Area -->
        <div id="canvas-container">
            <div id="loading" class="active">正在載入 3D 引擎...</div>
            <div class="instructions">拖曳以旋轉模型 | 滾動以縮放</div>
            <canvas id="orbital-canvas"></canvas>
            
            <!-- Float Reset Button -->
            <button id="btn-reset" style="display:none;">重置 (Reset)</button>
        </div>

        <!-- UI Sidebar / Bottom Sheet -->
        <aside id="controls-panel">
            <header>
                <h1>混成軌域展示</h1>
                <p>挑選欲重疊的軌域，若選取數量符合化學定則，即可解鎖「總表」並執行 3 秒的形變融合混成。</p>
            </header>

            <div class="orbital-selector-container">
                <h2>1. 選擇原子軌域</h2>
                <div class="orbital-grid">
                    <button class="atomic-btn" data-orb="s">s</button>
                    <button class="atomic-btn" data-orb="px">p<sub>x</sub></button>
                    <button class="atomic-btn" data-orb="py">p<sub>y</sub></button>
                    <button class="atomic-btn" data-orb="pz">p<sub>z</sub></button>
                    <button class="atomic-btn" data-orb="dz2">d<sub>z²</sub></button>
                    <button class="atomic-btn" data-orb="dx2y2">d<sub>x²-y²</sub></button>
                </div>
            </div>

            <div class="summary-table-container">
                <h2>2. 觸發對應的混成</h2>
                <div class="hybrid-options">
                    <!-- sp -->
                    <button class="hybrid-btn locked" data-type="sp" disabled>
                        <div class="btn-content">
                            <span class="type-badge">sp</span>
                            <span class="shape-name">直線型 (Linear)</span>
                            <span class="angle-info">180°</span>
                        </div>
                    </button>
                    <!-- sp2 -->
                    <button class="hybrid-btn locked" data-type="sp2" disabled>
                        <div class="btn-content">
                            <span class="type-badge">sp²</span>
                            <span class="shape-name">平面三角形 (Trigonal Planar)</span>
                            <span class="angle-info">120°</span>
                        </div>
                    </button>
                    <!-- sp3 -->
                    <button class="hybrid-btn locked" data-type="sp3" disabled>
                        <div class="btn-content">
                            <span class="type-badge">sp³</span>
                            <span class="shape-name">四面體 (Tetrahedral)</span>
                            <span class="angle-info">109.5°</span>
                        </div>
                    </button>
                    <!-- sp3d -->
                    <button class="hybrid-btn locked" data-type="sp3d" disabled>
                        <div class="btn-content">
                            <span class="type-badge">sp³d</span>
                            <span class="shape-name">雙三角錐 (Trigonal Bipyramidal)</span>
                            <span class="angle-info">90° / 120°</span>
                        </div>
                    </button>
                    <!-- sp3d2 -->
                    <button class="hybrid-btn locked" data-type="sp3d2" disabled>
                        <div class="btn-content">
                            <span class="type-badge">sp³d²</span>
                            <span class="shape-name">八面體 (Octahedral)</span>
                            <span class="angle-info">90°</span>
                        </div>
                    </button>
                </div>
            </div>
            
        </aside>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
