<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分光儀與光度計實驗系統</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-1: #0ea5e9;
            --accent-2: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        header {
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 40px;
        }

        .tool-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out both;
        }

        .tool-card:nth-child(2) { animation-delay: 0.2s; }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--accent);
            opacity: 0.8;
        }

        .spec-card { --accent: var(--accent-1); }
        .photo-card { --accent: var(--accent-2); }

        .tool-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(var(--accent-rgb), 0.2);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 25px;
            transition: transform 0.3s ease;
        }

        .tool-card:hover .icon-box {
            transform: scale(1.1) rotate(5deg);
        }

        h2 {
            font-size: 1.75rem;
            margin-bottom: 12px;
            color: #fff;
        }

        .description {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            flex-grow: 1;
        }

        .btn {
            background: var(--accent);
            color: #fff;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: opacity 0.3s;
        }

        .tool-card:hover .btn {
            opacity: 0.9;
        }

        footer {
            margin-top: 60px;
            color: var(--text-muted);
            font-size: 0.9rem;
            animation: fadeIn 1.2s ease-in;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 640px) {
            h1 { font-size: 2.2rem; }
            .tools-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>分光儀與光度計工具箱</h1>
            <p class="subtitle">為行動裝置與教學環境設計的行動科學實驗平台</p>
        </header>

        <div class="tools-grid">
            <a href="combined_spec_analy.html" class="tool-card spec-card">
                <div class="icon-box">🌈</div>
                <h2>分光儀分析</h2>
                <p class="description">
                    分析光的波長特性，支援即時相機取樣、波長校正與 CSV 資料匯出。
                </p>
                <span class="btn">立即開啟</span>
            </a>

            <a href="photometer_3.html" class="tool-card photo-card">
                <div class="icon-box">🧪</div>
                <h2>光度計實驗</h2>
                <p class="description">
                    測量溶液吸收度與穿透率，內建檢量線製作與時間序列監控功能。
                </p>
                <span class="btn">立即開啟</span>
            </a>
        </div>

        <footer>
            <p>&copy; 2026 行動科學實驗室</p>
        </footer>
    </div>
</body>
</html>
