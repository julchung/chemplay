<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web 光度計實驗工具</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #1a1e29;
            --panel-bg: rgba(30, 36, 48, 0.75);
            --accent-color: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.4);
            --text-main: #f0f4f8;
            --text-muted: #8c97a7;
            --border-color: rgba(255, 255, 255, 0.1);
            --danger-color: #ff4757;
            --success-color: #2ed573;
            --card-radius: 16px;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background: var(--primary-bg) linear-gradient(135deg, #13151a 0%, #1c2230 100%);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        h1, h2, h3 {
            margin: 0;
            font-weight: 600;
        }

        /* Layout Layout 4:1 Split */
        #container {
            display: flex;
            width: 100%;
            height: 100%;
            padding: 12px;
            gap: 12px;
            overflow: hidden;
        }

        #left-panel {
            flex: 2.8;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 0;
            height: 100%;
        }

        .panel-row {
            display: flex;
            gap: 15px;
            flex: 1;
            min-height: 0;
        }

        .panel-column {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            min-width: 0;
        }

        #right-panel {
            flex: 1;
            min-width: 340px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--card-radius);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            height: 100%;
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--card-radius);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        #camera-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            min-width: 0;
            min-height: 0;
        }

        #cameraCanvas {
            max-width: 100%;
            max-height: 100%;
            display: block;
            touch-action: none;
            cursor: crosshair;
        }

        .chart-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
            padding: 0; /* Header and wrapper will handle padding */
        }

        .chart-wrapper {
            flex: 1;
            position: relative;
            width: 100%;
            min-height: 0;
            padding: 10px;
        }

        .panel-header {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
        }

        .panel-header h3 {
            font-size: 0.95rem;
            color: var(--text-main);
        }

        /* UI Controls */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }
        .control-group:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .control-title {
            font-size: 0.85rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
            white-space: nowrap;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        select, input:not([type="range"]) {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 12px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:not([type="range"]):focus {
            border-color: var(--accent-color);
        }

        input[type="range"] {
            width: 100%;
            margin-top: 5px;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        button {
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        button.primary {
            background: var(--accent-color);
            color: #000;
            border: none;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        button.primary:hover {
            background: #00e0ff;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        button.danger {
            background: rgba(255, 71, 87, 0.2);
            color: var(--danger-color);
            border-color: rgba(255, 71, 87, 0.4);
        }

        button.danger:hover {
            background: rgba(255, 71, 87, 0.3);
        }
        
        button.success {
            background: rgba(46, 213, 115, 0.2);
            color: var(--success-color);
            border-color: rgba(46, 213, 115, 0.4);
        }

        /* Displays */
        .data-display {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            border: 1px inset var(--border-color);
        }

        .data-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .data-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .flex-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .flex-row > * {
            flex: 1;
        }

        .data-display.compact {
            padding: 6px;
        }

        .data-display.compact .data-value {
            font-size: 1.2rem;
        }

        .table-container {
            flex: 1;
            max-height: none;
            min-height: 80px;
            overflow-y: auto;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,0.2);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th, td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            background: rgba(0,0,0,0.4);
            color: var(--text-muted);
            position: sticky;
            top: 0;
            backdrop-filter: blur(5px);
        }
        tr:last-child td { border-bottom: none; }
        
        .tab-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            border-radius: 0;
            padding: 8px 5px;
            color: var(--text-muted);
            flex: 1;
        }
        .tab-btn.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
            font-weight: bold;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        @media (max-width: 900px) {
            #container {
                flex-direction: column;
                overflow-y: auto;
                height: auto;
            }
            #left-panel {
                flex: none;
                height: 800px; /* Fixed height for mobile to allow scrolling */
            }
            #camera-container {
                height: 400px;
                flex: none;
            }
            #chart-container {
                height: 400px;
                flex: none;
            }
            #right-panel {
                flex: none;
                overflow: visible;
            }
        }
    </style>
</head>
<body>

<div id="container">
    <!-- Left panel for Visuals -->
    <div id="left-panel">
        <div class="panel-row">
            <!-- Camera Frame -->
            <div id="camera-container" class="glass-card">
                <div class="panel-header">
                    <h3>攝影機畫面</h3>
                </div>
                <div style="flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #000;">
                    <canvas id="cameraCanvas"></canvas>
                </div>
            </div>
            
            <!-- Calibration Chart Frame -->
            <div id="calibration-container" class="glass-card chart-container">
                <div class="panel-header">
                    <h3>檢量線 (Calibration Curve)</h3>
                    <div id="chart-equation" style="color: var(--accent-color); font-size: 0.85rem; font-weight: 600;">
                        方程式: y = mx + c | R² = 0.00
                    </div>
                </div>
                <div class="chart-wrapper">
                    <canvas id="calibrationCanvas"></canvas>
                </div>
            </div>
        </div>
        
        <!-- Time Course Chart Frame -->
        <div id="timecourse-container" class="glass-card chart-container">
            <div class="panel-header">
                <h3>隨時間測量 (Time-Course)</h3>
                <div style="font-size: 0.85rem; color: var(--success-color);">
                    資料點: <span id="time-points-count-left">0</span>
                </div>
            </div>
            <div class="chart-wrapper">
                <canvas id="timecourseCanvas"></canvas>
            </div>
        </div>
    </div>

    <!-- Right panel for Controls -->
    <div id="right-panel">
        <h2>光度計控制中心</h2>

        <!-- Camera Section -->
        <div class="control-group">
            <div class="header-row">
                <div class="control-title">1. 相機設定</div>
                <select id="cameraSelect" style="flex: 1; padding: 4px 8px; font-size: 0.85rem; height: 32px; margin-top: 0;">
                    <option value="">請開啟相機</option>
                </select>
                <button id="btnCamera" style="padding: 4px 10px; height: 32px; font-size: 0.85rem; white-space: nowrap;">開啟</button>
            </div>
            
            <div style="display: flex; align-items: center; gap: 10px; margin-top: 2px;">
                <label style="white-space: nowrap; font-size: 0.75rem; color: var(--text-muted);">範圍</label>
                <input type="range" id="input-sampler-size" min="5" max="150" value="20" style="flex: 1; margin: 0;">
                <span id="label-sampler-size" style="font-size: 0.75rem; color: var(--accent-color); min-width: 35px;">20px</span>
            </div>
        </div>

        <!-- Blank Measurement -->
        <div class="control-group">
            <div class="header-row">
                <div class="control-title">2. 空白校正 (Blank)</div>
                <button id="btn-blank" style="padding: 4px 12px; height: 32px; font-size: 0.85rem; white-space: nowrap; background: rgba(0, 210, 255, 0.1); border-color: var(--accent-color);">設為空白(I₀)</button>
            </div>
            <div class="data-display compact flex-row" style="background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.05);">
                <div style="text-align: center;">
                    <div class="data-label" style="font-size: 0.65rem; margin-bottom: 0;">當前光強 (I)</div>
                    <div class="data-value" id="val-current-i" style="font-size: 1.1rem;">0</div>
                </div>
                <div style="text-align: center; border-left: 1px solid rgba(255,255,255,0.1);">
                    <div class="data-label" style="font-size: 0.65rem; margin-bottom: 0;">空白強度 (I₀)</div>
                    <div class="data-value" id="val-blank-i" style="font-size: 1.1rem; color: #fff;">0</div>
                </div>
            </div>
        </div>

        <!-- Single Sample -->
        <div class="control-group">
            <div class="header-row">
                <div class="control-title">3. 單一樣品測量</div>
                <button id="btn-measure" class="primary" style="padding: 4px 15px; height: 32px; font-size: 0.85rem; white-space: nowrap;">量測</button>
            </div>
            <div class="data-display compact flex-row">
                <div>
                    <div class="data-value" id="val-abs">0.000</div>
                    <div class="data-label" style="font-size: 0.65rem;">吸收度 (Abs)</div>
                </div>
                <div style="border-left: 1px solid rgba(255,255,255,0.1);">
                    <div class="data-value" id="val-trans" style="color: var(--success-color);">0.0%</div>
                    <div class="data-label" style="font-size: 0.65rem;">穿透率 (%T)</div>
                </div>
            </div>
        </div>

        <!-- Calibration Curve -->
        <div class="control-group">
            <div class="control-title">4. 檢量線製作 (Standard Curve)</div>
            <div class="flex-row">
                <div style="flex: 1.5; display: flex; align-items: center; gap: 8px;">
                    <label style="font-size: 0.75rem; white-space: nowrap;">濃度</label>
                    <input type="number" id="input-conc" placeholder="0.0" step="0.1" style="flex: 1; padding: 6px; font-size: 0.9rem;">
                </div>
                <button id="btn-add-calib" class="primary" style="flex: 1; padding: 6px; height: 32px; font-size: 0.85rem;">加入點</button>
            </div>
            <div class="table-container" style="max-height: 120px;">
                <table id="calib-table">
                    <thead>
                        <tr>
                            <th>濃度(C)</th>
                            <th>吸收度(A)</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="flex-row">
                <button id="btn-clear-calib" class="danger" style="padding: 5px; font-size: 0.8rem;">清除</button>
                <button id="btn-export-calib" style="padding: 5px; font-size: 0.8rem;">匯出</button>
            </div>
        </div>

        <!-- Time Course -->
        <div class="control-group">
            <div class="control-title">5. 隨時間測量 (Time-Course)</div>
            <div class="flex-row">
                <div style="flex: 1.5; display: flex; align-items: center; gap: 8px;">
                    <label style="font-size: 0.75rem; white-space: nowrap;">間隔(秒)</label>
                    <input type="number" id="input-interval" value="1.0" step="0.1" min="0.1" style="flex: 1; padding: 6px; font-size: 0.9rem;">
                </div>
                <button id="btn-time-start" class="success" style="flex: 1; padding: 6px; height: 32px; font-size: 0.85rem;">開始量測</button>
            </div>
            <div class="flex-row" style="justify-content: space-between;">
                <div style="font-size: 0.75rem; color: var(--text-muted);">
                    點數: <span id="time-points-count" style="color: white; font-weight: bold;">0</span>
                </div>
                <button id="btn-export-time" style="padding: 4px 10px; font-size: 0.8rem;">匯出 CSV</button>
            </div>
        </div>
    </div>
</div>


<!-- No Chart.js dependency needed -->

<script>
    /**
     * BULLETPROOF INITIALIZATION FOR IPAD
     * We use a direct call pattern at the bottom to avoid missing DOMContentLoaded.
     */
    
    // --- Logging Utility ---
    function vlog(msg) {
        console.log('[PhotometerApp] ' + msg);
        // Optional: Show in a small status area if we had one
    }

    // Check for Secure Context early
    if (window.isSecureContext === false) {
        alert("警告：此網頁未在安全環境（HTTPS 或 localhost）中執行。瀏覽器可能會禁止開啟相機。");
    }

    // --- State Management ---
    const state = {
        video: null,
        stream: null,
        isCameraActive: false,
        sampler: { x: -1, y: -1, size: 20 },
        values: { currentI: 0, I0: 1, currentAbs: 0, currentTrans: 100 },
        calibration: { points: [], slope: 0, intercept: 0, r2: 0 },
        timecourse: { active: false, data: [], intervalId: null, startTime: 0, interval: 1000 },
        timecourse: { active: false, data: [], intervalId: null, startTime: 0, interval: 1000 }
    };

    // --- Global DOM References ---
    let cameraCanvas, cameraCtx, cameraSelect, btnCamera;
    let valCurrI, valBlankI, valAbs, valTrans;
    let inConc, calibTableBody, calibrationCanvas, calibrationCtx;
    let timecourseCanvas, timecourseCtx, chartEq;
    let inInterval, btnTimeStart, timePointsCount, timePointsCountLeft;

    function bindDOMElements() {
        vlog("Binding DOM elements...");
        
        cameraCanvas = document.getElementById('cameraCanvas');
        if (cameraCanvas) {
            cameraCtx = cameraCanvas.getContext('2d', { alpha: false });
            vlog("Camera canvas found and context created");
        }
        
        cameraSelect = document.getElementById('cameraSelect');
        btnCamera = document.getElementById('btnCamera');
        
        valCurrI = document.getElementById('val-current-i');
        valBlankI = document.getElementById('val-blank-i');
        valAbs = document.getElementById('val-abs');
        valTrans = document.getElementById('val-trans');
        
        inConc = document.getElementById('input-conc');
        calibTableBody = document.querySelector('#calib-table tbody');
        
        calibrationCanvas = document.getElementById('calibrationCanvas');
        if (calibrationCanvas) calibrationCtx = calibrationCanvas.getContext('2d');
        
        timecourseCanvas = document.getElementById('timecourseCanvas');
        if (timecourseCanvas) timecourseCtx = timecourseCanvas.getContext('2d');
        
        chartEq = document.getElementById('chart-equation');
        
        inInterval = document.getElementById('input-interval');
        btnTimeStart = document.getElementById('btn-time-start');
        timePointsCount = document.getElementById('time-points-count');
        timePointsCountLeft = document.getElementById('time-points-count-left');

        if (!cameraCanvas || !btnCamera) {
            vlog("CRITICAL: UI Elements missing!");
        } else {
            vlog("DOM elements bound successfully.");
        }
    }

    // --- Core Render & Analysis Loop ---
    function renderLoop() {
        try {
            if (state.isCameraActive && state.video) {
                // Check if video has data available
                if (state.video.videoWidth && state.video.videoHeight) {
                    cameraCtx.drawImage(state.video, 0, 0, cameraCanvas.width, cameraCanvas.height);
                    analyzeIntensity();
                    drawSampler();
                }
            } else if (!state.isCameraActive && state.sampler.x < 0) {
                 if (cameraCtx && cameraCanvas.width > 0 && cameraCanvas.height > 0) {
                     cameraCtx.fillStyle = '#000';
                     cameraCtx.fillRect(0, 0, cameraCanvas.width, cameraCanvas.height);
                     cameraCtx.fillStyle = '#666';
                     cameraCtx.font = '20px Inter, sans-serif';
                     cameraCtx.textAlign = 'center';
                     cameraCtx.textBaseline = 'middle';
                     cameraCtx.fillText('請開啟相機', cameraCanvas.width/2, cameraCanvas.height/2);
                 }
            }
            drawAllCharts();
        } catch (e) {
            console.error("Render loop error:", e);
        }
        requestAnimationFrame(renderLoop);
    }

    function drawSampler() {
        const {x, y, size} = state.sampler;
        if(x < 0 || y < 0) return;
        cameraCtx.beginPath();
        cameraCtx.rect(x - size/2, y - size/2, size, size);
        cameraCtx.lineWidth = 2;
        cameraCtx.strokeStyle = '#00d2ff';
        cameraCtx.stroke();
        cameraCtx.beginPath();
        cameraCtx.moveTo(x, y - size/2 - 5); cameraCtx.lineTo(x, y + size/2 + 5);
        cameraCtx.moveTo(x - size/2 - 5, y); cameraCtx.lineTo(x + size/2 + 5, y);
        cameraCtx.strokeStyle = '#fff';
        cameraCtx.stroke();
    }

    function analyzeIntensity() {
        const {x, y, size} = state.sampler;
        if(x < 0 || y < 0) return;
        try {
            const imgData = cameraCtx.getImageData(x - size/2, y - size/2, size, size);
            const data = imgData.data;
            let sumLuma = 0;
            let count = 0;
            for(let i=0; i<data.length; i+=4) {
                const luma = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
                sumLuma += luma;
                count++;
            }
            state.values.currentI = sumLuma / count;
            if(state.values.currentI <= 0) state.values.currentI = 0.1;
            valCurrI.textContent = state.values.currentI.toFixed(1);
            calculateAbs();
        } catch(e) {}
    }

    function calculateAbs() {
        const I = state.values.currentI;
        const I0 = state.values.I0;
        let T = I / I0;
        if (T > 1) T = 1;
        if (T < 0.0001) T = 0.0001;
        state.values.currentTrans = T * 100;
        state.values.currentAbs = -Math.log10(T);
    }

    function updateSingleMeasurement() {
        calculateAbs();
        valAbs.textContent = state.values.currentAbs.toFixed(3);
        valTrans.textContent = state.values.currentTrans.toFixed(1) + '%';
        valAbs.parentElement.style.opacity = '0.5';
        setTimeout(() => valAbs.parentElement.style.opacity = '1', 100);
    }

    function measureBlank() {
        if(state.values.currentI > 0) {
            state.values.I0 = state.values.currentI;
            valBlankI.textContent = state.values.I0.toFixed(1);
            updateSingleMeasurement();
            vlog("Blank set: " + state.values.I0.toFixed(1));
        } else {
            alert('請先確保相機有畫面！');
        }
    }

    // --- Calibration Logic ---
    function addCalibrationPoint() {
        const concValue = parseFloat(inConc.value);
        if (isNaN(concValue)) return alert('請輸入有效的濃度數值');
        updateSingleMeasurement();
        const absValue = state.values.currentAbs;
        const existingIdx = state.calibration.points.findIndex(p => Math.abs(p.c - concValue) < 0.0001);
        if(existingIdx >= 0) {
            state.calibration.points[existingIdx].a = absValue; 
        } else {
            state.calibration.points.push({c: concValue, a: absValue});
        }
        state.calibration.points.sort((a,b) => a.c - b.c);
        updateCalibrationTable();
        calculateRegression();
        inConc.value = '';
    }

    function removeCalibrationPoint(idx) {
        state.calibration.points.splice(idx, 1);
        updateCalibrationTable();
        calculateRegression();
    }

    function clearCalibration() {
        if(confirm('確定清除檢量線資料？')) {
            state.calibration.points = [];
            state.calibration.slope = 0;
            state.calibration.intercept = 0;
            state.calibration.r2 = 0;
            updateCalibrationTable();
            chartEq.innerHTML = '方程式: y = mx + c | R² = 0.00';
        }
    }

    function updateCalibrationTable() {
        calibTableBody.innerHTML = '';
        state.calibration.points.forEach((p, i) => {
            const tr = document.createElement('tr');
            const tdConc = document.createElement('td'); tdConc.textContent = p.c.toFixed(2);
            const tdAbs = document.createElement('td'); tdAbs.textContent = p.a.toFixed(3);
            const tdOp = document.createElement('td');
            const btnDel = document.createElement('button');
            btnDel.textContent = '刪'; btnDel.className = 'danger';
            btnDel.style.padding = '2px 8px'; btnDel.style.fontSize = '0.8rem';
            btnDel.onclick = () => removeCalibrationPoint(i);
            tdOp.appendChild(btnDel);
            tr.appendChild(tdConc); tr.appendChild(tdAbs); tr.appendChild(tdOp);
            calibTableBody.appendChild(tr);
        });
    }

    function calculateRegression() {
        const pts = state.calibration.points;
        const n = pts.length;
        if(n < 2) {
            state.calibration.slope = 0; state.calibration.intercept = 0; state.calibration.r2 = 0;
            return;
        }
        let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0, sumY2 = 0;
        for (let i = 0; i < n; i++) {
            sumX += pts[i].c; sumY += pts[i].a;
            sumXY += pts[i].c * pts[i].a;
            sumX2 += pts[i].c * pts[i].c; sumY2 += pts[i].a * pts[i].a;
        }
        const denom = (n * sumX2 - sumX * sumX);
        if (denom === 0) {
            state.calibration.slope = 0; state.calibration.intercept = sumY / n; state.calibration.r2 = 1;
            return;
        }
        const m = (n * sumXY - sumX * sumY) / denom;
        const c = (sumY - m * sumX) / n;
        const meanY = sumY / n;
        let ssTot = 0, ssRes = 0;
        for (let i = 0; i < n; i++) {
            const fi = m * pts[i].c + c;
            ssTot += Math.pow(pts[i].a - meanY, 2);
            ssRes += Math.pow(pts[i].a - fi, 2);
        }
        const r2 = ssTot === 0 ? 1 : 1 - (ssRes / ssTot);
        state.calibration.slope = m; state.calibration.intercept = c; state.calibration.r2 = r2;
        const sign = c < 0 ? '-' : '+';
        chartEq.innerHTML = `方程式: A = <b>${m.toFixed(4)}</b> * C ${sign} ${Math.abs(c).toFixed(4)} | R² = <b>${r2.toFixed(4)}</b>`;
    }

    // --- Time Course ---
    function toggleTimeCourse() {
        if(state.timecourse.active) {
            clearInterval(state.timecourse.intervalId);
            state.timecourse.active = false;
            btnTimeStart.textContent = '開始量測';
            btnTimeStart.className = 'success';
            vlog("Time course STOPPED");
        } else {
            const iv = parseFloat(inInterval.value);
            if(isNaN(iv) || iv < 0.1) return alert('請輸入有效的時間間隔(>=0.1)');
            state.timecourse.data = [];
            state.timecourse.startTime = Date.now();
            state.timecourse.interval = iv * 1000;
            state.timecourse.intervalId = setInterval(timeCourseTick, state.timecourse.interval);
            state.timecourse.active = true;
            btnTimeStart.textContent = '停止量測';
            btnTimeStart.className = 'danger';
        }
    }

    function timeCourseTick() {
        updateSingleMeasurement();
        const t = (Date.now() - state.timecourse.startTime) / 1000;
        state.timecourse.data.push({t: t, a: state.values.currentAbs});
        if (timePointsCount) timePointsCount.textContent = state.timecourse.data.length;
        if (timePointsCountLeft) timePointsCountLeft.textContent = state.timecourse.data.length;
    }

    // --- Camera Control (from combined_spec_analy.html - known working) ---
    async function updateCameraList() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
            cameraSelect.innerHTML = '<option value="">不支援相機 (請檢查 HTTPS)</option>';
            return;
        }

        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            
            cameraSelect.innerHTML = '';
            videoDevices.forEach((device, index) => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                // If label is empty (common before permission), provide a generic name
                option.text = device.label || `Camera ${index + 1}`;
                cameraSelect.appendChild(option);
            });

            if (videoDevices.length === 0) {
                cameraSelect.innerHTML = '<option value="">未發現相機</option>';
            }
            vlog("Camera list updated: " + videoDevices.length + " devices");
        } catch (err) {
            vlog('Error listing cameras: ' + err.message);
            cameraSelect.innerHTML = '<option value="">無法讀取相機清單</option>';
        }
    }

    let isCameraLoading = false;
    async function toggleCamera() {
        vlog("toggleCamera function called");
        if (isCameraLoading) return;
        
        if (state.isCameraActive) {
            vlog("Stopping camera");
            stopCamera();
            return;
        }

        try {
            isCameraLoading = true;
            btnCamera.textContent = '啟動中...';
            btnCamera.disabled = true;

            vlog("Starting camera initialization");
            
            const deviceId = cameraSelect.value;
            let constraints = deviceId ? 
                { video: { deviceId: { exact: deviceId } } } : 
                { video: { facingMode: { ideal: 'environment' } } };

            try {
                vlog("Trying getUserMedia with constraints: " + JSON.stringify(constraints));
                state.stream = await navigator.mediaDevices.getUserMedia(constraints);
                vlog("Primary getUserMedia success");
            } catch (err) {
                vlog("Primary getUserMedia failed: " + err.message + ". Trying fallback...");
                state.stream = await navigator.mediaDevices.getUserMedia({ video: true });
                vlog("Fallback getUserMedia success");
            }

            state.video = document.createElement('video');
            state.video.setAttribute('playsinline', 'true');
            state.video.setAttribute('webkit-playsinline', 'true');
            state.video.setAttribute('autoplay', 'true');
            state.video.setAttribute('muted', 'true');
            state.video.muted = true;
            
            state.isCameraActive = true;
            state.video.srcObject = state.stream;
            
            state.video.onloadedmetadata = () => {
                vlog("Video metadata loaded. Starting play().");
                state.video.play().catch(e => vlog("Play failed: " + e.message));
                
                setupCanvasSize();
                if (state.sampler.x < 0) {
                    state.sampler.x = cameraCanvas.width / 2;
                    state.sampler.y = cameraCanvas.height / 2;
                }
            };

            btnCamera.textContent = '關閉相機';
            btnCamera.classList.add('active');
            setTimeout(updateCameraList, 500); 

        } catch (err) {
            vlog("Camera initialization error: " + err.message);
            alert('無法啟動相機。請檢查權限及是否使用 HTTPS！\n錯誤: ' + err.message);
            stopCamera(); // Clean up if failed
        } finally {
            isCameraLoading = false;
            btnCamera.disabled = false;
        }
    }

    function stopCamera() {
        if (state.stream) {
            state.stream.getTracks().forEach(track => track.stop());
            state.stream = null;
        }
        state.isCameraActive = false;
        state.video = null;
        btnCamera.textContent = '開啟相機';
        btnCamera.classList.remove('active');
    }

    function setupCanvasSize() {
        const container = document.getElementById('camera-container');
        if (!container) return;
        
        const vWidth = (state.video && state.video.videoWidth) ? state.video.videoWidth : 640;
        const vHeight = (state.video && state.video.videoHeight) ? state.video.videoHeight : 480;
        const vRatio = vWidth / vHeight;
        
        const cWidth = container.clientWidth || 400;
        const cHeight = container.clientHeight || 400;
        const cRatio = cWidth / cHeight;
        
        let w, h;
        if (vRatio > cRatio) { 
            w = cWidth; 
            h = w / vRatio; 
        } else { 
            h = cHeight; 
            w = h * vRatio; 
        }
        
        cameraCanvas.width = Math.max(w, 100);
        cameraCanvas.height = Math.max(h, 100);
    }

    // --- Interaction ---
    function setupCanvasInteraction() {
        let isDragging = false;
        cameraCanvas.addEventListener('pointerdown', (e) => {
            isDragging = true;
            cameraCanvas.setPointerCapture(e.pointerId);
            const rect = cameraCanvas.getBoundingClientRect();
            state.sampler.x = (e.clientX - rect.left) * (cameraCanvas.width / rect.width);
            state.sampler.y = (e.clientY - rect.top) * (cameraCanvas.height / rect.height);
        });
        cameraCanvas.addEventListener('pointermove', (e) => {
            if (isDragging) {
                const rect = cameraCanvas.getBoundingClientRect();
                state.sampler.x = (e.clientX - rect.left) * (cameraCanvas.width / rect.width);
                state.sampler.y = (e.clientY - rect.top) * (cameraCanvas.height / rect.height);
            }
        });
        cameraCanvas.addEventListener('pointerup', (e) => {
            isDragging = false;
            cameraCanvas.releasePointerCapture(e.pointerId);
            updateSingleMeasurement();
        });
    }

    function updateSamplerSize(val) {
        state.sampler.size = parseInt(val);
        document.getElementById('label-sampler-size').textContent = val + 'px';
    }

    function drawAllCharts() {
        if (calibrationCtx && calibrationCanvas) {
            drawGenericChart(calibrationCtx, calibrationCanvas, 'calibration');
        }
        if (timecourseCtx && timecourseCanvas) {
            drawGenericChart(timecourseCtx, timecourseCanvas, 'timecourse');
        }
    }

    function drawGenericChart(ctx, canvas, mode) {
        const w = canvas.width = canvas.parentElement.clientWidth;
        const h = canvas.height = canvas.parentElement.clientHeight;
        
        if (w === 0 || h === 0) return;
        
        ctx.clearRect(0, 0, w, h);
        
        const padding = { top: 30, right: 30, bottom: 55, left: 65 };
        const graphW = w - padding.left - padding.right;
        const graphH = h - padding.top - padding.bottom;
        
        if (graphW <= 0 || graphH <= 0) return;

        // Draw background grid
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.setLineDash([]);
        for(let i=0; i<=5; i++) {
            const y = padding.top + graphH - (i/5) * graphH;
            ctx.beginPath(); ctx.moveTo(padding.left, y); ctx.lineTo(padding.left + graphW, y); ctx.stroke();
        }
        for(let i=0; i<=5; i++){
            const x = padding.left + (i/5 * graphW);
            ctx.beginPath(); ctx.moveTo(x, padding.top); ctx.lineTo(x, padding.top + graphH); ctx.stroke();
        }

        // Draw main axes
        ctx.strokeStyle = '#8c97a7';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(padding.left, padding.top);
        ctx.lineTo(padding.left, padding.top + graphH);
        ctx.lineTo(padding.left + graphW, padding.top + graphH);
        ctx.stroke();
        
        // Axis labels (Common Y axis: Absorbance)
        ctx.fillStyle = '#8c97a7';
        ctx.font = '11px Inter, sans-serif';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        for(let i=0; i<=5; i++) {
            const val = (i * 0.4).toFixed(1); // Abs up to 2.0
            const y = padding.top + graphH - (i/5) * graphH;
            ctx.fillText(val, padding.left - 8, y);
            ctx.beginPath();ctx.moveTo(padding.left-4, y);ctx.lineTo(padding.left, y);ctx.stroke();
        }

        // Axis Titles
        ctx.save();
        ctx.translate(15, padding.top + graphH / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.textAlign = 'center';
        ctx.fillStyle = '#8c97a7';
        ctx.font = 'bold 12px Inter, sans-serif';
        ctx.fillText('吸收度 (Abs.)', 0, 0);
        ctx.restore();

        ctx.textAlign = 'center';
        ctx.fillStyle = '#8c97a7';
        ctx.font = 'bold 12px Inter, sans-serif';
        const xTitle = mode === 'calibration' ? '濃度 (Conc.)' : '時間 (Time, s)';
        ctx.fillText(xTitle, padding.left + graphW/2, padding.top + graphH + 40);
        
        if (mode === 'calibration') {
            ctx.font = '11px Inter, sans-serif'; // reset font for drawing axis ticks below
            drawCalibrationChart(ctx, padding, graphW, graphH);
        } else {
            ctx.font = '11px Inter, sans-serif';
            drawTimeCourseChart(ctx, padding, graphW, graphH);
        }
    }

    function drawCalibrationChart(ctx, padding, graphW, graphH) {
        const pts = state.calibration.points;
        if (pts.length === 0) return;
        
        // Find scale
        let maxC = Math.max(...pts.map(p => p.c), 1);
        let maxA = Math.max(...pts.map(p => p.a), 1);
        maxC *= 1.1; maxA *= 1.1;
        
        const mapX = (c) => padding.left + (c / maxC) * graphW;
        const mapY = (a) => padding.top + graphH - (a / maxA) * graphH;

        // X axis labels
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        for(let i=0; i<=5; i++){
            const val = (i/5 * maxC).toFixed(1);
            const x = padding.left + (i/5 * graphW);
            ctx.fillText(val, x, padding.top + graphH + 8);
        }

        // Draw regression line
        if (pts.length >= 2) {
            ctx.strokeStyle = 'rgba(0, 210, 255, 0.5)';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(mapX(0), mapY(state.calibration.intercept));
            ctx.lineTo(mapX(maxC), mapY(state.calibration.slope * maxC + state.calibration.intercept));
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Draw points
        ctx.fillStyle = '#00d2ff';
        pts.forEach(p => {
            ctx.beginPath();
            ctx.arc(mapX(p.c), mapY(p.a), 5, 0, Math.PI*2);
            ctx.fill();
        });
    }

    function drawTimeCourseChart(ctx, padding, graphW, graphH) {
        const data = state.timecourse.data;
        if (data.length === 0) return;

        let maxT = Math.max(...data.map(d => d.t), 10);
        let maxA = Math.max(...data.map(d => d.a), 1);
        maxT *= 1.05; maxA *= 1.1;

        const mapX = (t) => padding.left + (t / maxT) * graphW;
        const mapY = (a) => padding.top + graphH - (a / maxA) * graphH;

        // X axis labels
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        for(let i=0; i<=5; i++){
            const val = (i/5 * maxT).toFixed(0);
            const x = padding.left + (i/5 * graphW);
            ctx.fillText(val, x, padding.top + graphH + 8);
        }

        // Draw path
        ctx.strokeStyle = '#2ed573';
        ctx.lineWidth = 2;
        ctx.beginPath();
        data.forEach((d, i) => {
            if (i === 0) ctx.moveTo(mapX(d.t), mapY(d.a));
            else ctx.lineTo(mapX(d.t), mapY(d.a));
        });
        ctx.stroke();
        
        // Fill area
        ctx.lineTo(mapX(data[data.length-1].t), padding.top + graphH);
        ctx.lineTo(mapX(data[0].t), padding.top + graphH);
        ctx.fillStyle = 'rgba(46, 213, 115, 0.1)';
        ctx.fill();
    }

    function setupEvents() {
        vlog("Setting up events...");
        
        if (!btnCamera) {
            vlog("ERROR: btnCamera is null!");
            return;
        }
        
        btnCamera.addEventListener('click', toggleCamera);
        vlog("Camera button event listener added");
        
        document.getElementById('input-sampler-size').addEventListener('input', (e) => updateSamplerSize(e.target.value));
        document.getElementById('btn-blank').addEventListener('click', measureBlank);
        document.getElementById('btn-measure').addEventListener('click', updateSingleMeasurement);
        document.getElementById('btn-add-calib').addEventListener('click', addCalibrationPoint);
        document.getElementById('btn-clear-calib').addEventListener('click', clearCalibration);
        document.getElementById('btn-export-calib').addEventListener('click', () => exportCSV('calibration'));
        btnTimeStart.addEventListener('click', toggleTimeCourse);
        document.getElementById('btn-export-time').addEventListener('click', () => exportCSV('timecourse'));
        
        vlog("All event listeners set up");
    }

    function exportCSV(type) {
        let csv = ""; let filename = "";
        if (type === 'calibration') {
            if(state.calibration.points.length === 0) return alert('沒有資料可匯出');
            csv = "Concentration,Absorbance\n";
            state.calibration.points.forEach(p => csv += `${p.c},${p.a}\n`);
            filename = "calibration.csv";
        } else {
            if(state.timecourse.data.length === 0) return alert('沒有資料可匯出');
            csv = "Time(s),Absorbance\n";
            state.timecourse.data.forEach(p => csv += `${p.t.toFixed(1)},${p.a.toFixed(4)}\n`);
            filename = "timecourse.csv";
        }
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
    }

    let isAppInitialized = false;
    async function init() {
        if (isAppInitialized) return;
        isAppInitialized = true;
        
        try {
            vlog("Initializing application...");
            bindDOMElements();
            setupCanvasInteraction();
            setupEvents();
            setupCanvasSize();
            
            // Populate camera list early
            updateCameraList();
            
            requestAnimationFrame(renderLoop);
            vlog("Application initialized");
            document.body.classList.add('initialized');
        } catch (err) {
            vlog("Initialization error: " + err.message);
            alert("網頁初始化失敗: " + err.message);
        }
    }

    // Use DOMContentLoaded instead of window.onload for better reliability
    document.addEventListener('DOMContentLoaded', init);
    
    // Fallback for older browsers
    window.addEventListener('load', () => {
        if (!document.querySelector('.initialized')) {
            vlog("Fallback initialization triggered");
            init();
            document.body.classList.add('initialized');
        }
    });
    
    window.addEventListener('resize', function() { if (state.isCameraActive) setupCanvasSize(); });
    
</script>
